apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-observer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-observer
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-observer
subjects:
  - kind: ServiceAccount
    name: backend-observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-observer
